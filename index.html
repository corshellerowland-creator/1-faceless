<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Faceless Trader Hybrid</title>
<style>
:root{
  --accent:#ff00cc;
  --accent2:#8a2cff;
  --bg:#05050c;
}
body{
  margin:0;
  font-family:system-ui;
  background:var(--bg);
  color:white;
}
.header{
  display:flex;
  justify-content:space-between;
  padding:15px;
  align-items:center;
}
.title{
  font-size:22px;
  font-weight:bold;
  background:linear-gradient(90deg,var(--accent),var(--accent2));
  -webkit-background-clip:text;
  color:transparent;
}
.style-btn{
  padding:6px 10px;
  border:1px solid #555;
  border-radius:10px;
  cursor:pointer;
}
.grid{
  display:grid;
  grid-template-columns:repeat(3,1fr);
  gap:10px;
  padding:10px;
}
.card{
  padding:12px;
  border-radius:14px;
  background:#111;
  text-align:center;
  cursor:pointer;
}
.card.active{
  box-shadow:0 0 15px var(--accent);
}
.section{
  display:none;
  padding:15px;
}
.section.active{
  display:block;
}
input{
  width:100%;
  padding:10px;
  margin-top:8px;
  border-radius:10px;
  border:none;
  background:#111;
  color:white;
}
button{
  width:100%;
  padding:10px;
  margin-top:10px;
  border-radius:10px;
  border:none;
  background:linear-gradient(90deg,var(--accent),var(--accent2));
  color:white;
}
img.preview{
  width:100%;
  margin-top:10px;
  border-radius:10px;
}
</style>
</head>
<body>

<div class="header">
<div class="title">Faceless Trader</div>
<div class="style-btn" onclick="toggleTheme()">Style</div>
</div>

<div class="grid">
<div class="card active" onclick="showSection(event,'home')">Home</div>
<div class="card" onclick="showSection(event,'strategy')">Strategy</div>
<div class="card" onclick="showSection(event,'pnl')">PnL</div>
<div class="card" onclick="showSection(event,'journal')">Journal</div>
</div>

<div id="home" class="section active">
<h2>Home</h2>
<p>Main character (clean)</p>
</div>

<div id="strategy" class="section">
<h2>Strategy</h2>
<p>Thinking mode character here</p>
</div>

<div id="pnl" class="section">
<h2>PnL</h2>
<p>Execution character here</p>
</div>

<div id="journal" class="section">
<h2>Journal</h2>
<input placeholder="PnL">
<input type="file" accept="image/*" onchange="previewImage(event)">
<img id="imgPreview" class="preview"/>
<button>Save Entry</button>
</div>

<script>
function showSection(e,id){
 document.querySelectorAll('.section').forEach(s=>s.classList.remove('active'));
 document.getElementById(id).classList.add('active');
 document.querySelectorAll('.card').forEach(c=>c.classList.remove('active'));
 e.target.classList.add('active');
}

let mode=0;
function toggleTheme(){
 mode++;
 if(mode%2==0){
  document.documentElement.style.setProperty('--accent','#ff00cc');
  document.documentElement.style.setProperty('--accent2','#8a2cff');
 } else {
  document.documentElement.style.setProperty('--accent','#00ffcc');
  document.documentElement.style.setProperty('--accent2','#00cc88');
 }
}

function previewImage(e){
 const reader = new FileReader();
 reader.onload = function(){
  document.getElementById('imgPreview').src = reader.result;
 }
 reader.readAsDataURL(e.target.files[0]);
}
</script>

</body>
</html>
