<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Faceless Trader - Polished</title>
<style>
:root{
  --bg:#05050c;
  --panel:#0d0d1a;
  --glow:#ff00cc;
  --accent:#8a2cff;
}
body{
  margin:0;
  font-family:system-ui;
  background:radial-gradient(circle at top, rgba(138,44,255,0.3), transparent), #05050c;
  color:white;
}
.header{
  display:flex;
  justify-content:space-between;
  align-items:center;
  padding:20px;
}
.title{
  font-size:26px;
  font-weight:bold;
  background:linear-gradient(90deg,#ff00cc,#8a2cff);
  -webkit-background-clip:text;
  color:transparent;
}
.style-btn{
  padding:8px 12px;
  border-radius:12px;
  border:1px solid rgba(255,255,255,0.2);
  background:rgba(255,255,255,0.05);
  cursor:pointer;
}
.grid{
  display:grid;
  grid-template-columns:repeat(3,1fr);
  gap:12px;
  padding:12px;
}
.card{
  background:linear-gradient(145deg,#0d0d1a,#12122a);
  border-radius:18px;
  padding:14px;
  border:1px solid rgba(255,255,255,0.08);
  box-shadow:0 0 15px rgba(255,0,200,0.2);
}
.active{
  border:1px solid #ff00cc;
  box-shadow:0 0 25px rgba(255,0,200,0.5);
}
.section{
  margin:12px;
  padding:16px;
  border-radius:20px;
  background:linear-gradient(145deg,#0d0d1a,#151530);
  border:1px solid rgba(255,255,255,0.1);
  box-shadow:0 0 20px rgba(255,0,200,0.2);
}
input{
  width:100%;
  padding:12px;
  border-radius:12px;
  border:none;
  background:#0a0a15;
  color:white;
}
button{
  width:100%;
  padding:12px;
  margin-top:10px;
  border-radius:14px;
  border:none;
  background:linear-gradient(90deg,#ff00cc,#8a2cff);
  color:white;
  font-weight:bold;
}
</style>
</head>
<body>

<div class="header">
<div class="title">Faceless Trader</div>
<div class="style-btn" onclick="toggleTheme()">Style</div>
</div>

<div class="grid">
<div class="card">Home</div>
<div class="card">Plan</div>
<div class="card">Strategy</div>
<div class="card">Live</div>
<div class="card">Lock</div>
<div class="card active">PnL</div>
<div class="card">Eval</div>
<div class="card">Fund</div>
<div class="card">Journal</div>
<div class="card">Stats</div>
<div class="card">Sizer</div>
</div>

<div class="section">
<h3>Today's PnL</h3>
<input placeholder="0">
<h3>Trades Taken</h3>
<input placeholder="0">
<button>Save Day</button>
</div>

<script>
let mode=0;
function toggleTheme(){
  mode++;
  if(mode%2==0){
    document.body.style.background="#05050c";
  } else {
    document.body.style.background="#021b1b";
  }
}
</script>

</body>
</html>
